name: CI/CD Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest -v


  build-container:
    # Do not compile if tests fail
    needs: test

    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Apptainer (Singularity)
        uses: apptainer/actions/setup-apptainer@v1

      - name: Build Container
        run: apptainer build astralog.sif Singularity.def 