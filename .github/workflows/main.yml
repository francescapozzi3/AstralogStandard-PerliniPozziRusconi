name: CI/CD Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest -v

  build-container:
    # Do not compile if tests fail

    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Apptainer (Singularity)
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Build Container
        run: apptainer build astralog.sif Singularity.def 

      - name: Upload SIF Container as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: astralog-container
          path: astralog.sif

  deploy-and-run:
    needs: build-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SIF Container
        uses: actions/download-artifact@v4
        with:
          name: astralog-container
          path: .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/my_key
          printf "%s" "${{ secrets.SSH_CERTIFICATE }}" > ~/.ssh/my_key-cert.pub

          chmod 600 ~/.ssh/my_key
          chmod 644 ~/.ssh/my_key-cert.pub

          ssh-keyscan login.g100.cineca.it >> ~/.ssh/known_hosts

      - name: Inspect certificate
        run: |
          ssh-keygen -Lf ~/.ssh/my_key-cert.pub

      - name: Test SSH connection
        run: |
          ssh -vvv \
            -i ~/.ssh/my_key \
            -o CertificateFile=~/.ssh/my_key-cert.pub \
            ${{ secrets.HPC_USER }}@login.g100.cineca.it \
            "echo CONNECTED"

      - name: Copy files to Galileo100
        run: |
          scp -i ~/.ssh/my_key \
            -o CertificateFile=~/.ssh/my_key-cert.pub \
            astralog.sif job.sh \
            ${{ secrets.HPC_USER }}@login.g100.cineca.it:/g100/home/userexternal/${{ secrets.HPC_USER }}/

          scp -i ~/.ssh/my_key \
            -o CertificateFile=~/.ssh/my_key-cert.pub \
            -r input \
            ${{ secrets.HPC_USER }}@login.g100.cineca.it:/g100/home/userexternal/${{ secrets.HPC_USER }}/

            
      - name: Submit SLURM job
        run: |
          ssh -i ~/.ssh/my_key \
            -o CertificateFile=~/.ssh/my_key-cert.pub \
            ${{ secrets.HPC_USER }}@login.g100.cineca.it << EOF
            USER_HOME="/g100/home/userexternal/${{ secrets.HPC_USER }}"
            REPO_DIR="$USER_HOME/AstralogStandard-PerliniPozziRusconi"
            mv -f $USER_HOME/job.sh $REPO_DIR/
            cp -r $USER_HOME/input $REPO_DIR/
            cd $REPO_DIR
            mkdir -p logs
            rm -f logs/*
            sbatch job.sh
          EOF


     
