name: CI/CD Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest -v

  build-container:
    # Do not compile if tests fail
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Apptainer (Singularity)
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6

      - name: Build Container
        run: apptainer build astralog.sif Singularity.def 

      - name: Upload SIF Container as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: astralog-container
          path: astralog.sif

  deploy-and-run:
    needs: build-container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SIF Container
        uses: actions/download-artifact@v4
        with:
          name: astralog-container
          path: .

      - name: Copy containers and files to Galileo100
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          # password: ${{ secrets.HPC_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "astralog.sif,job.sh,input/**"
          target: "/g100/home/userexternal/${{ secrets.HPC_USER }}/"
          overwrite: true

      - name: Execute Remote SLURM Job Submission
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HPC_HOST }}
          username: ${{ secrets.HPC_USER }}
          # password: ${{ secrets.HPC_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            USER_HOME="/g100/home/userexternal/${{ secrets.HPC_USER }}"
            REPO_DIR="$USER_HOME/AstralogStandard-PerliniPozziRusconi"
            
            # Move the job.sh into the repository folder
            mv -f $USER_HOME/job.sh $REPO_DIR/

            # Move input into the repository folder
            mv -f $USER_HOME/input $REPO_DIR/

            # Enter the repository workspace folder
            cd $REPO_DIR

            # Clear out past log artifacts
            rm -f logs/*

            # Submit the job to SLURM
            sbatch job.sh
